
<!-- Form that has a image upload button allows for max of ten images to be uploaded -->

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Images</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1e6d2b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
        }

        .card {
            background-color: #fff;
            border-radius: 16px;
            padding: 40px 32px;
            width: 90%;
            max-width: 360px;
            text-align: center;
        }

        h1 {
            font-size: 20px;
            font-weight: 600;
            color: #1b4332;
            margin-bottom: 8px;
        }

        p {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 28px;
        }

        .file-picker {
            display: block;
            width: 100%;
            padding: 14px;
            border: 2px dashed #2d6a4f;
            border-radius: 12px;
            background-color: #f0faf4;
            color: #2d6a4f;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #1e6d2b;
;
            color: white;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }

        button:active {
            background-color: #1e6d2b;
        }
    </style>
</head>
<body>
    <div class ="card">
        <h1>Upload Image</h1>
        <p>Choose a photo to add to your gallery</p>

    <form action="/upload" method="POST" enctype="multipart/form-data">
        <input type="file" name="image" accept="image/jpeg" class="file-picker">
        <button type="submit">Upload</button>
    </form>
    <a href="/" ><button>View Gallery</button></a>
    </div>

    <!-- Script for compressing the inputted files before reaching the esp32-->
    <script>
        const maxWidth = 800;
        const maxHeight = 800;
        const quality = 0.4; // Compression quality (0 to 1)

        document.querySelector('form').addEventListener('submit', async function(e){ // Add event listener to the form submit button 
            e.preventDefault();

            const fileInput = document.querySelector('input[type="file"]');
            const file = fileInput.files[0]; //get the inputted file before it is sent to the esp32

            if(!file){
                alert('Please select an image to upload');
                return;
            }
            
            const img = await loadImage(file);
            const canvas = resizeImage(img); 

            canvas.toBlob(async function(blob) {
                const formData = new FormData();
                formData.append('image', blob, 'photo.jpg');

                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    showSuccess();
                } else {
                    alert('Upload failed — try again');
                }
            }, 'image/jpeg', quality);
        }); // Convert the canvas to a blob with the specified quality

        function loadImage(file){
            return new Promise((resolve)=>{
                const img = new Image(); 
                img.onload = () => resolve(img);
                img.src = URL.createObjectURL(file);
            })
        }

        function resizeImage(img){
            let width = img.width;
            let height = img.height;

            if(width > maxWidth || height > maxHeight){
                const aspectRatio = Math.min(maxWidth / width, maxHeight / height);

                width = Math.floor(width * aspectRatio);
                height = Math.floor(height * aspectRatio);
            }

            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            canvas.getContext('2d').drawImage(img, 0, 0, width, height);
            return canvas;
        }

        function showSuccess(){
            document.querySelector('.card').innerHTML = `
                <h1>Upload Successful!</h1>
                <p>Your image has been added to the gallery.</p>
            `;
        }

        

    </script>

</body>

</html>
